<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividades para desarrollar Pensamiento Matemático</title>
    <link rel="icon" type="image/png" href="assets/images/pandebono.png">
    <link rel="stylesheet" href="styles.css?v=2026022101">
</head>
<body>
    <!-- PANTALLA PRINCIPAL -->
    <section id="homeScreen" class="screen active">
        <div class="home-container">
            <h1 class="home-title">📐 Actividades para desarrollar Pensamiento Matemático 🧮</h1>
            <p class="home-subtitle">¡Vamos a explorar y aprender juntos!</p>
            <div class="activities-grid">
                <button id="activity0Btn" class="activity-card">
                    <img src="assets/images/pandebono.png" alt="Pandebono" class="activity-emoji activity-icon-image">
                    <div class="activity-badge">Actividad 0A</div>
                    <h2 class="activity-title">¿El orden de los factores altera el producto?</h2>
                </button>
                <button id="activity0BBtn" class="activity-card">
                    <span class="activity-emoji">🛍️</span>
                    <div class="activity-badge">Actividad 0B</div>
                    <h2 class="activity-title">El Misterio de las Sumas Repetidas</h2>
                </button>
                <!-- Aquí irán más actividades en el futuro
                <button id="activity1Btn" class="activity-card">
                    <span class="activity-emoji">🌟</span>
                    <div class="activity-badge">Actividad 1</div>
                    <h2 class="activity-title">Título de Actividad 1</h2>
                </button>
                -->
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Redirect to actividad0A.html when clicking Actividad 0A
            const activity0Btn = document.getElementById('activity0Btn');
            activity0Btn.addEventListener('click', () => {
                window.location.href = 'actividad0A.html';
            });

            // Redirect to actividad0B.html when clicking Actividad 0B
            const activity0BBtn = document.getElementById('activity0BBtn');
            activity0BBtn.addEventListener('click', () => {
                window.location.href = 'actividad0B.html';
            });
            
            // Future activities will be added here
            // const activity1Btn = document.getElementById('activity1Btn');
            // activity1Btn.addEventListener('click', () => {
            //     window.location.href = 'actividad1.html';
            // });
        });
    </script>
</body>
</html>
