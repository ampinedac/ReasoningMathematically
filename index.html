<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividades para desarrollar Razonamiento Matemático</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' dominant-baseline='central' font-size='52'%3E%F0%9F%98%8E%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="EstilosIndex.css">
</head>
<body>
    <div class="author-credit">Por: Ángela María Pineda Chacón</div>
    <!-- PANTALLA PRINCIPAL -->
    <section id="homeScreen" class="screen active">
        <div class="home-container">
            <div class="home-title-row">
                <h1 class="home-title">📐 Actividades para Desarrollar Razonamiento Matemático</h1>
                <img src="ImgWelcome.png" alt="Ilustración de bienvenida" class="home-title-image">
            </div>
            <p class="home-subtitle">¡Vamos a explorar y aprender juntos!</p>
            <div class="activities-grid">
                <button id="activity0Btn" class="activity-card">
                    <img src="pandebono.png" alt="Pandebono" class="activity-icon-image" style="width: 104px; height: 104px; min-width: 104px;">
                    <div class="activity-badge">Actividad 1</div>
                    <h2 class="activity-title">¿El orden de los factores altera el producto?</h2>
                </button>
                <button id="activity0BBtn" class="activity-card">
                    <span class="activity-emoji">🛍️</span>
                    <div class="activity-badge">Actividad 2</div>
                    <h2 class="activity-title">El Misterio de las Sumas Repetidas</h2>
                </button>
                <button id="activity3Btn" class="activity-card">
                    <span class="activity-emoji">🤖</span>
                    <div class="activity-badge">Actividad 3</div>
                    <h2 class="activity-title">Misión Robot V</h2>
                </button>
                <button id="activity4Btn" class="activity-card">
                    <span class="activity-emoji">👗</span>
                    <div class="activity-badge">Actividad 4</div>
                    <h2 class="activity-title">El closet de Sarita</h2>
                </button>
                <button id="activity5Btn" class="activity-card">
                    <span class="activity-emoji">🎬</span>
                    <div class="activity-badge">Actividad 5</div>
                    <h2 class="activity-title">La película</h2>
                </button>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Redirigir a Actividad 0A
            const activity0Btn = document.getElementById('activity0Btn');
            activity0Btn.addEventListener('click', () => {
                window.location.href = 'Actividad1/actividad0A.html';
            });

            // Redirigir a Actividad 0B
            const activity0BBtn = document.getElementById('activity0BBtn');
            activity0BBtn.addEventListener('click', () => {
                window.location.href = 'Actividad2/actividad0B.html';
            });

            // Redirigir a Actividad 3
            const activity3Btn = document.getElementById('activity3Btn');
            activity3Btn.addEventListener('click', () => {
                window.location.href = 'Actividad3/Actividad3.html';
            });

            // Redirigir a Actividad 4
            const activity4Btn = document.getElementById('activity4Btn');
            activity4Btn.addEventListener('click', () => {
                window.location.href = 'Actividad4/Actividad4.html';
            });

            // Redirigir a Actividad 5
            const activity5Btn = document.getElementById('activity5Btn');
            activity5Btn.addEventListener('click', () => {
                window.location.href = 'Actividad5/Actividad5.html';
            });
        });
    </script>
</body>
</html>
