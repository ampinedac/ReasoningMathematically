<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1920" height="1080" fill="#f8f6ff"/>
  <!-- Calculadora -->
  <g>
    <rect x="120" y="120" width="120" height="160" rx="20" fill="#ffe0e9" stroke="#e0b7d7" stroke-width="6"/>
    <rect x="140" y="140" width="80" height="40" rx="8" fill="#b5ead7"/>
    <circle cx="160" cy="200" r="12" fill="#f9f871"/>
    <circle cx="200" cy="200" r="12" fill="#f9f871"/>
    <circle cx="160" cy="240" r="12" fill="#f9f871"/>
    <circle cx="200" cy="240" r="12" fill="#f9f871"/>
  </g>
  <!-- Regla -->
  <g>
    <rect x="400" y="80" width="200" height="32" rx="8" fill="#ffe5b4" stroke="#e0b7d7" stroke-width="4"/>
    <rect x="420" y="90" width="8" height="12" fill="#e0b7d7"/>
    <rect x="440" y="90" width="8" height="12" fill="#e0b7d7"/>
    <rect x="460" y="90" width="8" height="12" fill="#e0b7d7"/>
    <rect x="480" y="90" width="8" height="12" fill="#e0b7d7"/>
    <rect x="500" y="90" width="8" height="12" fill="#e0b7d7"/>
    <rect x="520" y="90" width="8" height="12" fill="#e0b7d7"/>
    <rect x="540" y="90" width="8" height="12" fill="#e0b7d7"/>
    <rect x="560" y="90" width="8" height="12" fill="#e0b7d7"/>
  </g>
  <!-- Números y símbolos -->
  <g>
    <text x="900" y="200" font-size="80" font-family="Lobster Two, Rancho, Arial" fill="#b5ead7">+ 7 × 3 = ?</text>
    <text x="700" y="400" font-size="60" font-family="Lobster Two, Rancho, Arial" fill="#ffdac1">12</text>
    <text x="1100" y="600" font-size="60" font-family="Lobster Two, Rancho, Arial" fill="#b5ead7">÷ 4</text>
    <text x="1300" y="300" font-size="60" font-family="Lobster Two, Rancho, Arial" fill="#f9f871">=</text>
  </g>
  <!-- Figuras geométricas -->
  <g>
    <circle cx="1700" cy="200" r="60" fill="#b5ead7"/>
    <rect x="1600" y="400" width="120" height="120" rx="24" fill="#ffdac1"/>
    <polygon points="1800,800 1860,900 1740,900" fill="#ffe5b4"/>
  </g>
  <!-- Lápiz -->
  <g>
    <rect x="300" y="900" width="180" height="24" rx="8" fill="#ffe5b4" stroke="#e0b7d7" stroke-width="4"/>
    <polygon points="480,900 520,912 480,924" fill="#f9f871"/>
  </g>
  <!-- Fondo decorativo pastel -->
  <ellipse cx="400" cy="1000" rx="220" ry="80" fill="#ffe0e9" fill-opacity="0.4"/>
  <ellipse cx="1600" cy="100" rx="180" ry="60" fill="#b5ead7" fill-opacity="0.3"/>
  <ellipse cx="1700" cy="900" rx="120" ry="40" fill="#ffdac1" fill-opacity="0.3"/>
</svg>
