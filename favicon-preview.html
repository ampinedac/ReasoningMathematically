<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vista previa de favicons</title>
  <style>
    :root {
      --bg: #eef7ff;
      --card: #ffffff;
      --ink: #1e3a8a;
      --muted: #5b6b88;
      --line: #d3e6fb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top left, #f5fbff 0%, var(--bg) 60%, #dcefff 100%);
      color: var(--ink);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.9rem;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(30, 64, 175, 0.08);
      text-align: center;
    }

    .icon {
      width: 64px;
      height: 64px;
      image-rendering: auto;
    }

    .name {
      font-weight: 700;
      margin-top: 10px;
    }

    .path {
      font-size: 0.86rem;
      color: var(--muted);
      margin-top: 6px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>Opciones de favicon</h1>
  <p>Elige la que más te guste y la pongo en todas las páginas.</p>

  <div class="grid">
    <article class="card">
      <img class="icon" src="assets/images/math-brain-favicon.svg" alt="Cerebrito matemático actual">
      <div class="name">Actual</div>
      <div class="path">assets/images/math-brain-favicon.svg</div>
    </article>

    <article class="card">
      <img class="icon" src="assets/images/math-brain-favicon-minimal.svg" alt="Cerebrito minimalista">
      <div class="name">Minimalista</div>
      <div class="path">assets/images/math-brain-favicon-minimal.svg</div>
    </article>

    <article class="card">
      <img class="icon" src="assets/images/math-brain-favicon-cute.svg" alt="Cerebrito caricatura">
      <div class="name">Caricatura</div>
      <div class="path">assets/images/math-brain-favicon-cute.svg</div>
    </article>
  </div>
</body>
</html>
